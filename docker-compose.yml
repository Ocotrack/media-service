services:
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --address ":9003" --console-address ":9004"
    volumes:
      - minio_data:/data
    ports:
      - "9003:9003"   # API MinIO accesible desde el host (para las URLs firmadas)
      - "9004:9004"   # Consola MinIO
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    restart: unless-stopped

  media-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-service
    depends_on:
      - minio
      - redis
    environment:
      # MinIO interno (dentro de la red de Docker)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}          # minio:9003
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_BUCKET: ${MINIO_BUCKET}

      # Host público que verán tus clientes (se usa para reescribir la URL firmada)
      PUBLIC_MINIO_ENDPOINT: ${PUBLIC_MINIO_ENDPOINT}

      # TTL de las URLs firmadas
      MEDIA_URL_TTL_SECONDS: ${MEDIA_URL_TTL_SECONDS}

      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # API Keys
      API_KEYS: ${API_KEYS}

      # FastAPI
      PORT: ${PORT}
      ENV: ${ENV}
    ports:
      - "8002:8002"
    restart: unless-stopped

volumes:
  minio_data:
