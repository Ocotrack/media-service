services:
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --address ":9003" --console-address ":9004"
    volumes:
      - minio_data:/data
    ports:
      - "9003:9003"
      - "9004:9004"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    restart: unless-stopped

  media-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-service
    depends_on:
      - minio
      - redis
    environment:
      MINIO_ENDPOINT: casamagoswiss.ddns.net:9003
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_BUCKET: ${MINIO_BUCKET}

      MEDIA_URL_TTL_SECONDS: ${MEDIA_URL_TTL_SECONDS}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      API_KEYS: ${API_KEYS}
      PORT: ${PORT}
      ENV: ${ENV}

      PUBLIC_MINIO_ENDPOINT: ${PUBLIC_MINIO_ENDPOINT}

    ports:
      - "8002:8002"

    extra_hosts:
      - "casamagoswiss.ddns.net:192.168.1.126"

    restart: unless-stopped


volumes:
  minio_data:
