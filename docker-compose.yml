services:

  # ============================================================
  # MinIO - S3-Compatible Object Storage (optional for local dev)
  # For production, you can replace this with AWS S3 or Cloudflare R2
  # by simply changing the AWS_* variables in .env.
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: media-service-minio
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  # ============================================================
  # Media Service - FastAPI Application
  # ============================================================
  media-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-service
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    ports:
      - "${PORT:-8002}:8002"
    restart: unless-stopped

volumes:
  minio_data:
